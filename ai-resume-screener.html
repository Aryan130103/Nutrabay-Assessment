<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Resume Screener — Nutrabay</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f12;
      --bg2:       #13161b;
      --bg3:       #1a1e26;
      --border:    rgba(255,255,255,0.07);
      --border2:   rgba(255,255,255,0.13);
      --accent:    #00c98d;
      --accent2:   #00a874;
      --accent-bg: rgba(0,201,141,0.08);
      --text:      #e8eaed;
      --muted:     #7a8394;
      --muted2:    #4a5162;
      --amber:     #f5a623;
      --amber-bg:  rgba(245,166,35,0.1);
      --red:       #f05252;
      --red-bg:    rgba(240,82,82,0.1);
      --radius:    10px;
      --radius-lg: 16px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Scrollbar ───────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

    /* ── Layout ──────────────────────────────────────────────── */
    .shell {
      max-width: 820px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 5rem;
    }

    /* ── Navbar ──────────────────────────────────────────────── */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-dot {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; color: #0d0f12; letter-spacing: -0.5px;
    }
    .brand-name { font-size: 15px; font-weight: 600; }
    .brand-tag  { font-size: 11px; color: var(--muted); margin-top: 1px; }

    /* ── Stepper ─────────────────────────────────────────────── */
    .stepper {
      display: flex; align-items: center;
      margin-bottom: 2rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.5rem;
      gap: 0;
      overflow-x: auto;
    }
    .step-item { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .step-circle {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
      transition: all 0.25s;
      flex-shrink: 0;
    }
    .step-circle.done   { background: var(--accent); color: #0d0f12; }
    .step-circle.active { background: var(--accent); color: #0d0f12; box-shadow: 0 0 0 4px rgba(0,201,141,0.2); }
    .step-circle.idle   { background: var(--bg3); color: var(--muted); border: 1px solid var(--border2); }
    .step-text { font-size: 13px; font-weight: 500; color: var(--muted); white-space: nowrap; }
    .step-text.active   { color: var(--text); }
    .step-line { flex: 1; height: 1px; background: var(--border2); margin: 0 10px; min-width: 16px; }

    /* ── Card ────────────────────────────────────────────────── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.75rem;
      margin-bottom: 1rem;
    }
    .card-title  { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .card-sub    { font-size: 13px; color: var(--muted); margin-bottom: 1.5rem; }

    /* ── Form Controls ───────────────────────────────────────── */
    label {
      display: block;
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--muted); margin-bottom: 6px;
    }
    input[type="text"], input[type="password"], textarea {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      resize: vertical;
    }
    input[type="text"]:focus, input[type="password"]:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,201,141,0.12);
    }
    textarea { min-height: 160px; line-height: 1.6; }
    .char-count { font-size: 12px; color: var(--muted2); text-align: right; margin-top: 5px; }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 20px;
      border-radius: var(--radius);
      font-family: 'Sora', sans-serif;
      font-size: 13px; font-weight: 600;
      cursor: pointer; border: none;
      transition: all 0.15s; white-space: nowrap;
      text-decoration: none;
    }
    .btn-primary { background: var(--accent); color: #0d0f12; }
    .btn-primary:hover:not(:disabled) { background: var(--accent2); transform: translateY(-1px); }
    .btn-primary:disabled { background: var(--bg3); color: var(--muted2); cursor: not-allowed; transform: none; }
    .btn-ghost {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border2);
    }
    .btn-ghost:hover { background: var(--bg3); color: var(--text); }
    .btn-danger {
      background: var(--red-bg); color: var(--red);
      border: 1px solid rgba(240,82,82,0.2);
      font-size: 12px; padding: 6px 10px;
    }
    .btn-danger:hover { background: rgba(240,82,82,0.18); }
    .btn-sample {
      background: var(--accent-bg); color: var(--accent);
      border: 1px solid rgba(0,201,141,0.2);
      font-size: 12px; padding: 5px 12px; border-radius: 20px;
    }
    .btn-sample:hover { background: rgba(0,201,141,0.15); }

    /* ── Nav Row ─────────────────────────────────────────────── */
    .nav-row {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-top: 1.5rem; flex-wrap: wrap; gap: 10px;
    }

    /* ── Candidate Input Card ────────────────────────────────── */
    .cand-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 0.75rem;
      animation: fadeIn 0.2s ease;
    }
    .cand-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 12px;
    }
    .cand-num {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--accent);
      background: var(--accent-bg);
      padding: 3px 10px; border-radius: 20px;
    }
    .cand-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 14px; }
    @media (max-width: 560px) { .cand-grid { grid-template-columns: 1fr; } }

    .add-cand-btn {
      width: 100%; padding: 12px;
      background: transparent;
      border: 1px dashed var(--border2);
      border-radius: var(--radius);
      color: var(--muted); font-family: 'Sora', sans-serif;
      font-size: 14px; cursor: pointer;
      transition: all 0.15s; text-align: center;
    }
    .add-cand-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

    /* ── Progress Panel ──────────────────────────────────────── */
    .progress-wrap {
      display: flex; flex-direction: column;
      align-items: center; padding: 3rem 1rem;
    }
    .progress-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .progress-sub   { font-size: 14px; color: var(--muted); margin-bottom: 2.5rem; text-align: center; }
    .progress-list  { width: 100%; max-width: 420px; }
    .p-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      animation: fadeIn 0.3s ease;
    }
    .p-item:last-child { border-bottom: none; }
    .p-dot {
      width: 22px; height: 22px; border-radius: 50%;
      flex-shrink: 0; display: flex; align-items: center;
      justify-content: center; font-size: 11px; font-weight: 700;
      transition: all 0.25s;
    }
    .p-dot.pending { background: var(--bg3); border: 1.5px solid var(--border2); }
    .p-dot.running { background: var(--accent-bg); border: 1.5px solid var(--accent); }
    .p-dot.done    { background: var(--accent); color: #0d0f12; }
    .p-dot.error   { background: var(--red-bg); border: 1.5px solid var(--red); color: var(--red); }
    .p-name  { font-size: 14px; flex: 1; }
    .p-status{ font-size: 12px; color: var(--muted); }

    .spinner {
      width: 11px; height: 11px;
      border: 2px solid rgba(0,201,141,0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }

    /* ── Results ─────────────────────────────────────────────── */
    .results-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; flex-wrap: wrap;
      gap: 12px; margin-bottom: 1.5rem;
    }
    .results-title { font-size: 22px; font-weight: 700; }
    .results-meta  { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .results-btns  { display: flex; gap: 8px; flex-wrap: wrap; }

    .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 1.5rem; }
    @media (max-width: 580px) { .stats-row { grid-template-columns: repeat(2,1fr); } }
    .stat-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
    .stat-lbl  { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 6px; }
    .stat-val  { font-size: 24px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .c-green { color: var(--accent); }
    .c-amber { color: var(--amber); }
    .c-red   { color: var(--red); }

    /* Summary Table */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--muted); padding: 10px 14px;
      border-bottom: 1px solid var(--border2); text-align: left;
      white-space: nowrap;
    }
    td { padding: 13px 14px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
    tbody tr { cursor: pointer; transition: background 0.1s; }
    tbody tr:hover td { background: var(--bg3); }
    tbody tr:last-child td { border-bottom: none; }

    .rank-circle {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
    }
    .r1 { background: rgba(245,166,35,0.15); color: var(--amber); border: 1px solid rgba(245,166,35,0.3); }
    .r2 { background: rgba(180,178,169,0.15); color: #b4b2a9; border: 1px solid rgba(180,178,169,0.3); }
    .r3 { background: rgba(211,131,84,0.15); color: #d38354; border: 1px solid rgba(211,131,84,0.3); }
    .rn { background: var(--bg3); color: var(--muted); border: 1px solid var(--border2); }

    .score-wrap { display: flex; align-items: center; gap: 8px; }
    .score-bar  { flex: 1; height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; min-width: 55px; }
    .score-fill { height: 100%; border-radius: 3px; transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1); }
    .score-num  { font-size: 13px; font-weight: 700; font-family: 'JetBrains Mono', monospace; min-width: 34px; }

    .badge {
      display: inline-flex; align-items: center;
      padding: 4px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.03em; white-space: nowrap;
    }
    .badge-strong   { background: var(--accent-bg);  color: var(--accent); border: 1px solid rgba(0,201,141,0.25); }
    .badge-moderate { background: var(--amber-bg);   color: var(--amber);  border: 1px solid rgba(245,166,35,0.25); }
    .badge-not      { background: var(--red-bg);     color: var(--red);    border: 1px solid rgba(240,82,82,0.25); }

    /* ── Detail Cards ────────────────────────────────────────── */
    .detail-section { margin-top: 1.5rem; }
    .detail-section-title {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--muted); margin-bottom: 10px;
    }
    .detail-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 10px;
      overflow: hidden;
    }
    .detail-head {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 14px 18px; cursor: pointer;
      transition: background 0.1s;
    }
    .detail-head:hover { background: var(--bg3); }
    .detail-head-left  { display: flex; align-items: center; gap: 10px; }
    .detail-head-right { display: flex; align-items: center; gap: 12px; }
    .cand-name-big { font-size: 15px; font-weight: 600; }
    .chevron { font-size: 12px; color: var(--muted); transition: transform 0.2s; }
    .chevron.open { transform: rotate(180deg); }

    .detail-body { display: none; padding: 0 18px 18px; }
    .detail-body.open { display: block; }

    .cols2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 14px; }
    @media (max-width: 520px) { .cols2 { grid-template-columns: 1fr; } }

    .col-label {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .col-strengths .col-label { color: var(--accent); }
    .col-gaps .col-label      { color: var(--red); }

    .tag {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 11px; border-radius: 6px;
      font-size: 12px; margin: 3px 3px 3px 0;
    }
    .tag-green { background: var(--accent-bg); color: var(--accent); border: 1px solid rgba(0,201,141,0.2); }
    .tag-red   { background: var(--red-bg);    color: var(--red);    border: 1px solid rgba(240,82,82,0.2); }

    .summary-para {
      font-size: 13px; color: var(--muted);
      line-height: 1.7; margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    /* ── Error Banner ────────────────────────────────────────── */
    .error-box {
      background: var(--red-bg);
      border: 1px solid rgba(240,82,82,0.25);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 13px; color: var(--red);
      margin-bottom: 1rem;
    }

    /* ── Insights Panel ──────────────────────────────────────── */
    .insights-card {
      background: linear-gradient(135deg, rgba(0,201,141,0.06) 0%, rgba(0,168,116,0.03) 100%);
      border: 1px solid rgba(0,201,141,0.2);
      border-radius: var(--radius-lg);
      padding: 1.75rem;
      margin-top: 1.5rem;
    }
    .insights-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 1.25rem;
      flex-wrap: wrap; gap: 10px;
    }
    .insights-title-row { display: flex; align-items: center; gap: 10px; }
    .insights-icon {
      width: 34px; height: 34px; border-radius: 8px;
      background: var(--accent); color: #0d0f12;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; flex-shrink: 0;
    }
    .insights-title { font-size: 15px; font-weight: 700; }
    .insights-sub   { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .insights-loading {
      display: flex; align-items: center; gap: 10px;
      color: var(--muted); font-size: 14px; padding: 1rem 0;
    }
    .insight-item {
      display: flex; gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(0,201,141,0.1);
      animation: fadeIn 0.3s ease;
    }
    .insight-item:last-child { border-bottom: none; }
    .insight-num {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--accent-bg); color: var(--accent);
      border: 1px solid rgba(0,201,141,0.3);
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px;
    }
    .insight-content { flex: 1; }
    .insight-label {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--accent); margin-bottom: 4px;
    }
    .insight-text { font-size: 14px; color: var(--text); line-height: 1.6; }

    /* ── Footer ──────────────────────────────────────────────── */
    .footer {
      margin-top: 4rem;
      text-align: center;
      font-size: 12px; color: var(--muted2);
    }
    .footer span { color: var(--accent); }
  </style>
</head>

/* ─────────────────────────────────────────────
   API KEY MANAGEMENT
───────────────────────────────────────────── */
function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val.startsWith('sk-')) {
    showError('Please enter a valid Anthropic API key (starts with sk-ant...)');
    return;
  }
  state.apiKey = val;
  localStorage.setItem('nb_api_key', val);
  document.getElementById('api-banner').classList.remove('visible');
  clearError();
  render();
}

function toggleKeyBanner() {
  const banner = document.getElementById('api-banner');
  banner.classList.toggle('visible');
  if (banner.classList.contains('visible') && state.apiKey) {
    document.getElementById('api-key-input').value = state.apiKey;
  }
}

/* ─────────────────────────────────────────────
   ERROR HANDLING
───────────────────────────────────────────── */
function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}
function clearError() {
  document.getElementById('error-box').style.display = 'none';
}

/* ─────────────────────────────────────────────
   RENDER ENGINE
───────────────────────────────────────────── */
function render() {
  renderStepper();
  renderContent();
  // pre-fill API key if exists
  if (state.apiKey) {
    document.getElementById('api-banner').classList.remove('visible');
  }
  const inp = document.getElementById('api-key-input');
  if (inp && state.apiKey) inp.value = state.apiKey;
}

function renderStepper() {
  const steps = [
    { n: 1, label: 'Job Description' },
    { n: 2, label: 'Candidates' },
    { n: 3, label: 'Analyzing' },
    { n: 4, label: 'Results' },
  ];
  document.getElementById('stepper').innerHTML = steps.map((s, i) => `
    <div class="step-item">
      <div class="step-circle ${state.step > s.n ? 'done' : state.step === s.n ? 'active' : 'idle'}">
        ${state.step > s.n ? '✓' : s.n}
      </div>
      <span class="step-text ${state.step === s.n ? 'active' : ''}">${s.label}</span>
    </div>
    ${i < steps.length - 1 ? '<div class="step-line"></div>' : ''}
  `).join('');
}

function renderContent() {
  const el = document.getElementById('main-content');
  if (state.step === 1) el.innerHTML = buildStep1();
  else if (state.step === 2) el.innerHTML = buildStep2();
  else if (state.step === 3) el.innerHTML = buildStep3();
  else if (state.step === 4) el.innerHTML = buildStep4();
}

/* ─────────────────────────────────────────────
   ANALYSIS — CLAUDE API CALL
───────────────────────────────────────────── */
async function startAnalysis() {
  if (!state.apiKey) {
    showError('Please enter your Anthropic API key first (top right button).');
    document.getElementById('api-banner').classList.add('visible');
    return;
  }
  syncCandidates();
  const valid = state.candidates.filter(c => c.name.trim() && c.resume.trim());
  if (!valid.length) { showError('Please add at least one candidate with a name and resume.'); return; }
  clearError();

  state.progress = valid.map(c => ({ id: c.id, name: c.name, status: 'pending' }));
  state.results = [];
  state.step = 3;
  render();

  for (let i = 0; i < valid.length; i++) {
    const c = valid[i];
    state.progress[i].status = 'running';
    updateProgressItem(c.id, 'running');

    try {
      const result = await analyzeOne(state.jd, c.name, c.resume);
      result.id = c.id;
      result.name = c.name;
      state.results.push(result);
      state.progress[i].status = 'done';
      updateProgressItem(c.id, 'done');
    } catch (err) {
      console.error(err);
      state.results.push({
        id: c.id, name: c.name, score: 0,
        strengths: ['Could not evaluate'], gaps: ['API error — check your key'],
        recommendation: 'Not Fit', summary: 'Analysis failed: ' + err.message
      });
      state.progress[i].status = 'error';
      updateProgressItem(c.id, 'error');
    }

    await sleep(400);
  }

  await sleep(900);
  state.step = 4;
  render();
}

async function analyzeOne(jd, name, resume) {
  const prompt = `You are a senior HR recruiter and talent evaluator. Your task is to evaluate a candidate's resume against a job description.

Return ONLY a valid JSON object — no markdown, no explanation, no extra text.

Required JSON format:
{
  "score": <integer 0-100>,
  "strengths": ["<strength 1>", "<strength 2>", "<strength 3>"],
  "gaps": ["<gap 1>", "<gap 2>", "<gap 3>"],
  "recommendation": "<Strong Fit|Moderate Fit|Not Fit>",
  "summary": "<2 sentences summarizing overall fit>"
}

Scoring guide:
- 80–100: Excellent match, most required skills and experience present
- 60–79: Good match with minor gaps, strong potential
- 40–59: Partial match, notable gaps in key areas
- 0–39: Poor match, missing most requirements

Recommendation rules:
- "Strong Fit"   → score >= 70
- "Moderate Fit" → score 45–69
- "Not Fit"      → score < 45

Keep strengths and gaps specific and concise (5–7 words each). Summary should be 2 sentences only.

JOB DESCRIPTION:
${jd}

CANDIDATE NAME: ${name}
RESUME:
${resume}

Respond with ONLY the JSON object:`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': state.apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `HTTP ${res.status}`);
  }

  const data = await res.json();
  const raw  = (data.content || []).map(b => b.text || '').join('');
  const clean = raw.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

async function generateInsights() {
  state.insightsLoading = true;
  state.insights = null;
  // re-render just the insights body
  const body = document.getElementById('insights-body');
  if (body) body.innerHTML = `

    </div>`;
  // hide generate button
  const btn = document.querySelector('.insights-card .btn-primary');
  if (btn) btn.style.display = 'none';

  const sorted = [...state.results].sort((a, b) => b.score - a.score);
  const summary = sorted.map(r =>
    `${r.name}: score ${r.score}/100, ${r.recommendation}. Strengths: ${(r.strengths||[]).join(', ')}. Gaps: ${(r.gaps||[]).join(', ')}.`
  ).join('\n');

  const prompt = `You are a senior HR consultant. Based on the resume screening results below, generate strategic hiring insights and actionable recommendations.

Return ONLY a valid JSON array of exactly 5 objects, no markdown, no extra text:
[
  { "category": "<short category label>", "insight": "<1-2 sentence actionable insight>" },
  ...
]

Categories to cover (one each):
1. Candidate Pool Quality — overall assessment of the talent pool
2. Common Skill Gap — most frequently missing skill across candidates
3. JD Improvement — how to attract better candidates
4. Sourcing Recommendation — where/how to source better candidates
5. Process Improvement — suggest one hiring process improvement

JOB DESCRIPTION SUMMARY:
${state.jd.substring(0, 600)}

SCREENING RESULTS:
${summary}

Return ONLY the JSON array:`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const raw  = (data.content || []).map(b => b.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    state.insights = JSON.parse(clean);
  } catch (e) {
    state.insights = [{ category: 'Error', insight: 'Could not generate insights. Please try again.' }];
  }

  state.insightsLoading = false;
  if (body) body.innerHTML = buildInsightsBody(state.insights);
}

/* ─────────────────────────────────────────────
   AUTO DOWNLOAD REPORT
───────────────────────────────────────────── */
function downloadReport() {
  if (!state.results.length) return;
  const sorted = [...state.results].sort((a, b) => b.score - a.score);
  let out = `AI RESUME SCREENING REPORT\n`;
  out += `Generated: ${new Date().toLocaleString()}\n`;
  out += `Role: ${state.jd.split('\n')[0] || 'Position'}\n\n`;
  out += `${'═'.repeat(70)}\n`;
  out += `SUMMARY\n`;
  out += `${'─'.repeat(70)}\n`;
  out += `Total Candidates : ${sorted.length}\n`;
  out += `Strong Fit       : ${sorted.filter(r => r.recommendation === 'Strong Fit').length}\n`;
  out += `Moderate Fit     : ${sorted.filter(r => r.recommendation === 'Moderate Fit').length}\n`;
  out += `Not a Fit        : ${sorted.filter(r => r.recommendation === 'Not Fit').length}\n`;
  out += `Average Score    : ${Math.round(sorted.reduce((s,r) => s + r.score, 0) / sorted.length)}/100\n\n`;
  out += `${'═'.repeat(70)}\n`;
  out += `CANDIDATE RANKINGS\n`;
  out += `${'─'.repeat(70)}\n`;
  sorted.forEach((r, i) => {
    out += `\n#${i+1} ${r.name}\n`;
    out += `Score          : ${r.score}/100\n`;
    out += `Recommendation : ${r.recommendation}\n`;
    out += `Strengths      : ${(r.strengths||[]).join(' | ')}\n`;
    out += `Gaps           : ${(r.gaps||[]).join(' | ')}\n`;
    out += `Summary        : ${r.summary}\n`;
    out += `${'─'.repeat(70)}\n`;
  });
  if (state.insights && state.insights.length) {
    out += `\n${'═'.repeat(70)}\n`;
    out += `AI HIRING INSIGHTS & RECOMMENDATIONS\n`;
    out += `${'─'.repeat(70)}\n`;
    state.insights.forEach((item, i) => {
      out += `\n${i+1}. ${item.category}\n   ${item.insight}\n`;
    });
  }
  out += `\n${'═'.repeat(70)}\n`;
  out += `Generated by AI Resume Screener — Powered by Claude API\n`;

  const blob = new Blob([out], { type: 'text/plain' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `screening-report-${new Date().toISOString().split('T')[0]}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

/* ─────────────────────────────────────────────
   UI HELPERS
───────────────────────────────────────────── */
const expanded = new Set();

function toggleDetail(id) {
  const body  = document.getElementById(`detail-${id}`);
  const chev  = document.getElementById(`chev-${id}`);
  if (!body) return;
  if (expanded.has(id)) {
    expanded.delete(id);
    body.classList.remove('open');
    if (chev) { chev.textContent = '▼'; chev.classList.remove('open'); }
  } else {
    expanded.add(id);
    body.classList.add('open');
    if (chev) { chev.textContent = '▲'; chev.classList.add('open'); }
  }
}

function goBack(step) {
  clearError();
  state.step = step;
  render();
}

function copyReport(btn) {
  if (!state.results.length) return;
  const sorted = [...state.results].sort((a, b) => b.score - a.score);
  let out = `AI RESUME SCREENING REPORT\n`;
  out += `Generated: ${new Date().toLocaleString()}\n`;
  out += `JD Preview: ${state.jd.substring(0, 80).replace(/\n/g,' ')}...\n\n`;
  out += `${'─'.repeat(68)}\n`;
  out += `RANK   CANDIDATE              SCORE    RECOMMENDATION\n`;
  out += `${'─'.repeat(68)}\n`;
  sorted.forEach((r, i) => {
    out += `${String(i+1).padEnd(7)}${r.name.padEnd(23)}${String(r.score).padStart(3)}/100   ${r.recommendation}\n`;
    out += `       Strengths : ${(r.strengths||[]).join(' | ')}\n`;
    out += `       Gaps      : ${(r.gaps||[]).join(' | ')}\n`;
    out += `       Summary   : ${r.summary}\n`;
    out += `${'─'.repeat(68)}\n`;
  });
  if (state.insights && state.insights.length) {
    out += `\nAI HIRING INSIGHTS\n${'─'.repeat(68)}\n`;
    state.insights.forEach((item, i) => {
      out += `${i+1}. ${item.category}: ${item.insight}\n`;
    });
  }
  navigator.clipboard.writeText(out).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = orig, 2000);
  }).catch(() => {});
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ─────────────────────────────────────────────
   INIT
───────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  if (state.apiKey) {
    document.getElementById('api-banner').classList.remove('visible');
  }
  render();
});
</script>
