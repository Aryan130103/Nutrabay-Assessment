<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Resume Screener — Nutrabay</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f12; --bg2: #13161b; --bg3: #1a1e26;
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
      --accent: #00c98d; --accent2: #00a874; --accent-bg: rgba(0,201,141,0.08);
      --text: #e8eaed; --muted: #7a8394; --muted2: #4a5162;
      --amber: #f5a623; --amber-bg: rgba(245,166,35,0.1);
      --red: #f05252; --red-bg: rgba(240,82,82,0.1);
      --radius: 10px; --radius-lg: 16px;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

    .shell { max-width: 820px; margin: 0 auto; padding: 2.5rem 1.25rem 5rem; }

    /* Navbar */
    .navbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2.5rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-name { font-size: 15px; font-weight: 600; }
    .brand-tag  { font-size: 11px; color: var(--muted); margin-top: 1px; }

    /* Stepper */
    .stepper { display: flex; align-items: center; margin-bottom: 2rem; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.5rem; overflow-x: auto; }
    .step-item { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .step-circle { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; transition: all 0.25s; flex-shrink: 0; }
    .step-circle.done   { background: var(--accent); color: #0d0f12; }
    .step-circle.active { background: var(--accent); color: #0d0f12; box-shadow: 0 0 0 4px rgba(0,201,141,0.2); }
    .step-circle.idle   { background: var(--bg3); color: var(--muted); border: 1px solid var(--border2); }
    .step-text { font-size: 13px; font-weight: 500; color: var(--muted); white-space: nowrap; }
    .step-text.active { color: var(--text); }
    .step-line { flex: 1; height: 1px; background: var(--border2); margin: 0 10px; min-width: 16px; }

    /* Card */
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.75rem; margin-bottom: 1rem; }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .card-sub   { font-size: 13px; color: var(--muted); margin-bottom: 1.5rem; }

    /* Form */
    label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 6px; }
    input[type="text"], textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text); font-family: 'Sora', sans-serif; font-size: 14px; padding: 10px 14px; outline: none; transition: border-color 0.15s, box-shadow 0.15s; resize: vertical; }
    input[type="text"]:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,201,141,0.12); }
    textarea { min-height: 160px; line-height: 1.6; }
    .char-count { font-size: 12px; color: var(--muted2); text-align: right; margin-top: 5px; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 20px; border-radius: var(--radius); font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; white-space: nowrap; }
    .btn-primary { background: var(--accent); color: #0d0f12; }
    .btn-primary:hover:not(:disabled) { background: var(--accent2); transform: translateY(-1px); }
    .btn-primary:disabled { background: var(--bg3); color: var(--muted2); cursor: not-allowed; transform: none; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border2); }
    .btn-ghost:hover { background: var(--bg3); color: var(--text); }
    .btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid rgba(240,82,82,0.2); font-size: 12px; padding: 6px 10px; }
    .btn-danger:hover { background: rgba(240,82,82,0.18); }
    .btn-sample { background: var(--accent-bg); color: var(--accent); border: 1px solid rgba(0,201,141,0.2); font-size: 12px; padding: 5px 12px; border-radius: 20px; cursor: pointer; font-family: 'Sora', sans-serif; font-weight: 600; }
    .btn-sample:hover { background: rgba(0,201,141,0.15); }

    .nav-row { display: flex; align-items: center; justify-content: space-between; margin-top: 1.5rem; flex-wrap: wrap; gap: 10px; }

    /* Candidate card */
    .cand-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 0.75rem; }
    .cand-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .cand-num { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--accent); background: var(--accent-bg); padding: 3px 10px; border-radius: 20px; }
    .cand-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 14px; }
    @media (max-width: 560px) { .cand-grid { grid-template-columns: 1fr; } }
    .add-cand-btn { width: 100%; padding: 12px; background: transparent; border: 1px dashed var(--border2); border-radius: var(--radius); color: var(--muted); font-family: 'Sora', sans-serif; font-size: 14px; cursor: pointer; transition: all 0.15s; text-align: center; }
    .add-cand-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

    /* Upload zone */
    .upload-zone { border: 1px dashed var(--border2); border-radius: var(--radius); padding: 12px 14px; cursor: pointer; transition: all 0.15s; text-align: center; background: var(--bg); margin-bottom: 8px; }
    .upload-zone:hover { border-color: var(--accent); background: var(--accent-bg); }
    .upload-zone.dragover { border-color: var(--accent); background: var(--accent-bg); }
    .upload-zone.loaded { border-color: var(--accent); background: var(--accent-bg); }
    .upload-label { font-size: 12px; color: var(--muted); display: flex; align-items: center; justify-content: center; gap: 6px; pointer-events: none; }
    .upload-label.success { color: var(--accent); font-weight: 600; }
    .upload-or { font-size: 11px; color: var(--muted2); text-align: center; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
    .resume-label-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }

    /* Progress */
    .progress-wrap { display: flex; flex-direction: column; align-items: center; padding: 3rem 1rem; }
    .progress-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .progress-sub   { font-size: 14px; color: var(--muted); margin-bottom: 2.5rem; text-align: center; }
    .progress-list  { width: 100%; max-width: 420px; }
    .p-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .p-item:last-child { border-bottom: none; }
    .p-dot { width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; transition: all 0.25s; }
    .p-dot.pending { background: var(--bg3); border: 1.5px solid var(--border2); }
    .p-dot.running { background: var(--accent-bg); border: 1.5px solid var(--accent); }
    .p-dot.done    { background: var(--accent); color: #0d0f12; }
    .p-dot.error   { background: var(--red-bg); border: 1.5px solid var(--red); color: var(--red); }
    .p-name   { font-size: 14px; flex: 1; }
    .p-status { font-size: 12px; color: var(--muted); }
    .spinner { width: 11px; height: 11px; border: 2px solid rgba(0,201,141,0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }

    /* Results */
    .results-top { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 1.5rem; }
    .results-title { font-size: 22px; font-weight: 700; }
    .results-meta  { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .results-btns  { display: flex; gap: 8px; flex-wrap: wrap; }
    .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 1.5rem; }
    @media (max-width: 580px) { .stats-row { grid-template-columns: repeat(2,1fr); } }
    .stat-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
    .stat-lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 6px; }
    .stat-val { font-size: 24px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .c-green { color: var(--accent); } .c-amber { color: var(--amber); } .c-red { color: var(--red); }

    /* Table */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); padding: 10px 14px; border-bottom: 1px solid var(--border2); text-align: left; white-space: nowrap; }
    td { padding: 13px 14px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
    tbody tr { cursor: pointer; transition: background 0.1s; }
    tbody tr:hover td { background: var(--bg3); }
    tbody tr:last-child td { border-bottom: none; }
    .rank-circle { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
    .r1 { background: rgba(245,166,35,0.15); color: var(--amber); border: 1px solid rgba(245,166,35,0.3); }
    .r2 { background: rgba(180,178,169,0.15); color: #b4b2a9; border: 1px solid rgba(180,178,169,0.3); }
    .r3 { background: rgba(211,131,84,0.15); color: #d38354; border: 1px solid rgba(211,131,84,0.3); }
    .rn { background: var(--bg3); color: var(--muted); border: 1px solid var(--border2); }
    .score-wrap { display: flex; align-items: center; gap: 8px; }
    .score-bar  { flex: 1; height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; min-width: 55px; }
    .score-fill { height: 100%; border-radius: 3px; }
    .score-num  { font-size: 13px; font-weight: 700; font-family: 'JetBrains Mono', monospace; min-width: 34px; }
    .badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.03em; white-space: nowrap; }
    .badge-strong   { background: var(--accent-bg); color: var(--accent); border: 1px solid rgba(0,201,141,0.25); }
    .badge-moderate { background: var(--amber-bg);  color: var(--amber);  border: 1px solid rgba(245,166,35,0.25); }
    .badge-not      { background: var(--red-bg);    color: var(--red);    border: 1px solid rgba(240,82,82,0.25); }

    /* Detail */
    .detail-section { margin-top: 1.5rem; }
    .detail-section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 10px; }
    .detail-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 10px; overflow: hidden; }
    .detail-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; cursor: pointer; transition: background 0.1s; }
    .detail-head:hover { background: var(--bg3); }
    .detail-head-left  { display: flex; align-items: center; gap: 10px; }
    .detail-head-right { display: flex; align-items: center; gap: 12px; }
    .cand-name-big { font-size: 15px; font-weight: 600; }
    .chevron { font-size: 12px; color: var(--muted); }
    .detail-body { display: none; padding: 0 18px 18px; }
    .detail-body.open { display: block; }
    .cols2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 14px; }
    @media (max-width: 520px) { .cols2 { grid-template-columns: 1fr; } }
    .col-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .col-strengths .col-label { color: var(--accent); }
    .col-gaps .col-label { color: var(--red); }
    .tag { display: inline-flex; align-items: center; gap: 5px; padding: 5px 11px; border-radius: 6px; font-size: 12px; margin: 3px 3px 3px 0; }
    .tag-green { background: var(--accent-bg); color: var(--accent); border: 1px solid rgba(0,201,141,0.2); }
    .tag-red   { background: var(--red-bg);    color: var(--red);    border: 1px solid rgba(240,82,82,0.2); }
    .summary-para { font-size: 13px; color: var(--muted); line-height: 1.7; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }

    /* Insights */
    .insights-card { background: linear-gradient(135deg, rgba(0,201,141,0.06) 0%, rgba(0,168,116,0.03) 100%); border: 1px solid rgba(0,201,141,0.2); border-radius: var(--radius-lg); padding: 1.75rem; margin-top: 1.5rem; }
    .insights-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 10px; }
    .insights-title-row { display: flex; align-items: center; gap: 10px; }
    .insights-icon { width: 34px; height: 34px; border-radius: 8px; background: var(--accent); color: #0d0f12; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; flex-shrink: 0; }
    .insights-title { font-size: 15px; font-weight: 700; }
    .insights-sub   { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .insights-loading { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 14px; padding: 1rem 0; }
    .insight-item { display: flex; gap: 12px; padding: 14px 0; border-bottom: 1px solid rgba(0,201,141,0.1); animation: fadeIn 0.3s ease; }
    .insight-item:last-child { border-bottom: none; }
    .insight-num { width: 22px; height: 22px; border-radius: 50%; background: var(--accent-bg); color: var(--accent); border: 1px solid rgba(0,201,141,0.3); font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
    .insight-content { flex: 1; }
    .insight-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent); margin-bottom: 4px; }
    .insight-text  { font-size: 14px; color: var(--text); line-height: 1.6; }

    /* Error */
    .error-box { background: var(--red-bg); border: 1px solid rgba(240,82,82,0.25); border-radius: var(--radius); padding: 12px 16px; font-size: 13px; color: var(--red); margin-bottom: 1rem; }

    /* Footer */
    .footer { margin-top: 4rem; text-align: center; font-size: 12px; color: var(--muted2); }
    .footer span { color: var(--accent); }
  </style>
</head>

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = '⚠ ' + msg; el.style.display = 'block';
}
function clearError() { document.getElementById('error-box').style.display = 'none'; }

function render() {
  renderStepper();
  const el = document.getElementById('main-content');
  if (state.step === 1) el.innerHTML = buildStep1();
  else if (state.step === 2) el.innerHTML = buildStep2();
  else if (state.step === 3) el.innerHTML = buildStep3();
  else if (state.step === 4) el.innerHTML = buildStep4();
}

function renderStepper() {
  const steps = [{ n:1, label:'Job Description'},{n:2,label:'Candidates'},{n:3,label:'Analyzing'},{n:4,label:'Results'}];
  document.getElementById('stepper').innerHTML = steps.map((s,i) => `
    <div class="step-item">
      <div class="step-circle ${state.step>s.n?'done':state.step===s.n?'active':'idle'}">${state.step>s.n?'&#10003;':s.n}</div>
      <span class="step-text ${state.step===s.n?'active':''}">${s.label}</span>
    </div>${i<3?'<div class="step-line"></div>':''}`).join('');
}

function buildStep1() {
  return `<div class="card">
    <div class="card-title">Enter Job Description</div>
    <div class="card-sub">Paste the full JD — skills, responsibilities, qualifications.
      &nbsp;<button class="btn-sample" onclick="loadSampleJD()">&#x2193; Load sample JD</button></div>
    <label>Job Description</label>
    <textarea id="jd-ta" placeholder="Paste job description here..." oninput="state.jd=this.value;document.getElementById('jd-next').disabled=!this.value.trim();document.getElementById('jd-chars').textContent=this.value.length+' characters'">${esc(state.jd)}</textarea>
    <div class="char-count" id="jd-chars">${state.jd.length} characters</div>
  </div>
  <div class="nav-row">
    <div></div>
    <button class="btn btn-primary" id="jd-next" onclick="goStep2()" ${!state.jd.trim()?'disabled':''}>Next: Add Candidates &#8594;</button>

function loadSampleJD() { state.jd = SAMPLE_JD; render(); }

function addCandidate() {
  syncCandidates();
  state.candidates.push({ id: state.nextId++, name: '', resume: '' });
  render();
}

function removeCandidate(id) {
  syncCandidates();
  state.candidates = state.candidates.filter(c => c.id !== id);
  render();
}

function updateCand(id, field, value) {
  const c = state.candidates.find(x => x.id === id);
  if (c) c[field] = value;
  const filled = state.candidates.filter(c => c.name.trim() && c.resume.trim()).length;
  const btn = document.querySelector('.nav-row .btn-primary');
  if (btn) { btn.disabled = filled < 1; btn.textContent = `Analyze ${filled} Candidate${filled!==1?'s':''} \u2192`; }
}

function syncCandidates() {
  state.candidates.forEach(c => {
    const n = document.querySelector(`#cand-${c.id} input[type="text"]`);
    const r = document.querySelector(`#cand-${c.id} textarea`);
    if (n) c.name = n.value;
    if (r) c.resume = r.value;

}

      </div>
    </div>`).join('');

async function callGroq(prompt) {
  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + GROQ_KEY },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      temperature: 0.1,
      max_tokens: 1500,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || 'HTTP ' + res.status);
  }
  const data = await res.json();
  return data.choices[0].message.content || '';
}

async function startAnalysis() {
  syncCandidates();
  const valid = state.candidates.filter(c => c.name.trim() && c.resume.trim());
  if (!valid.length) { showError('Please add at least one candidate.'); return; }
  clearError();
  state.progress = valid.map(c => ({ id: c.id, name: c.name, status: 'pending' }));
  state.results = [];
  state.step = 3;
  render();

  for (let i = 0; i < valid.length; i++) {
    const c = valid[i];
    state.progress[i].status = 'running';
    updateProgress(c.id, 'running');
    try {
      const prompt = `You are a senior HR recruiter. Evaluate the resume against the job description.
Return ONLY a valid JSON object, no markdown, no extra text.
Format: {"score":<0-100>,"strengths":["s1","s2","s3"],"gaps":["g1","g2","g3"],"recommendation":"Strong Fit|Moderate Fit|Not Fit","summary":"2 sentences"}
Rules: score>=70 = Strong Fit, 45-69 = Moderate Fit, <45 = Not Fit.
JD: ${state.jd}
CANDIDATE: ${c.name}
RESUME: ${c.resume}
JSON only:`;
      const raw = await callGroq(prompt);
      const match = raw.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('Invalid JSON response');
      const result = JSON.parse(match[0]);
      result.id = c.id; result.name = c.name;
      state.results.push(result);
      state.progress[i].status = 'done';
      updateProgress(c.id, 'done');
    } catch (err) {
      console.error(err);
      state.results.push({ id: c.id, name: c.name, score: 0, strengths: ['Could not evaluate'], gaps: ['Error: ' + err.message], recommendation: 'Not Fit', summary: 'Analysis failed.' });
      state.progress[i].status = 'error';
      updateProgress(c.id, 'error');
    }
    await sleep(800);
  }
  await sleep(800);
  state.step = 4;
  render();
}

async function generateInsights() {
  state.insightsLoading = true;
  const body = document.getElementById('insights-body');
  const btn = document.querySelector('.insights-card .btn-primary');
  if (body) body.innerHTML = '<div class="insights-loading"><div class="spinner"></div>Generating insights...</div>';
  if (btn) btn.style.display = 'none';

  const sorted = [...state.results].sort((a,b) => b.score - a.score);
  const summary = sorted.map(r => `${r.name}: ${r.score}/100, ${r.recommendation}. Strengths: ${(r.strengths||[]).join(', ')}. Gaps: ${(r.gaps||[]).join(', ')}.`).join('\n');

  const prompt = `You are a senior HR consultant. Based on resume screening results, generate 5 strategic hiring insights.
Return ONLY a JSON array, no markdown: [{"category":"label","insight":"1-2 sentences"},...]
Cover: 1) Candidate Pool Quality 2) Common Skill Gap 3) JD Improvement 4) Sourcing Recommendation 5) Process Improvement
JD: ${state.jd.substring(0,400)}
Results: ${summary}
JSON array only:`;

  try {
    const raw = await callGroq(prompt);
    const match = raw.match(/\[[\s\S]*\]/);
    if (!match) throw new Error('No JSON array');
    state.insights = JSON.parse(match[0]);
  } catch (e) {
    state.insights = [{ category: 'Error', insight: 'Could not generate insights. Please try again.' }];
  }
  state.insightsLoading = false;
  if (body) body.innerHTML = buildInsightsHTML(state.insights);
}

const expanded = new Set();
function toggleDetail(id) {
  const body = document.getElementById('detail-'+id);
  const chev = document.getElementById('chev-'+id);
  if (!body) return;
  if (expanded.has(id)) { expanded.delete(id); body.classList.remove('open'); if (chev) chev.innerHTML = '&#x25BC;'; }
  else { expanded.add(id); body.classList.add('open'); if (chev) chev.innerHTML = '&#x25B2;'; }
}

function goBack(step) { clearError(); state.step = step; render(); }

function copyReport(btn) {
  const sorted = [...state.results].sort((a,b) => b.score - a.score);
  let out = 'AI RESUME SCREENING REPORT\nGenerated: ' + new Date().toLocaleString() + '\n\n';
  out += '-'.repeat(68) + '\n';
  sorted.forEach((r,i) => {
    out += `${i+1}. ${r.name} — ${r.score}/100 — ${r.recommendation}\n`;
    out += `   Strengths: ${(r.strengths||[]).join(' | ')}\n`;
    out += `   Gaps: ${(r.gaps||[]).join(' | ')}\n`;
    out += `   ${r.summary}\n\n`;
  });
  navigator.clipboard.writeText(out).then(() => {
    const orig = btn.textContent; btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 2000);
  }).catch(() => {});
}

function downloadReport() {
  const sorted = [...state.results].sort((a,b) => b.score - a.score);
  let out = 'AI RESUME SCREENING REPORT\nGenerated: ' + new Date().toLocaleString() + '\n\n';
  out += '='.repeat(70) + '\nSUMMARY\n' + '-'.repeat(70) + '\n';
  out += `Total: ${sorted.length} | Strong Fit: ${sorted.filter(r=>r.recommendation==='Strong Fit').length} | Avg Score: ${Math.round(sorted.reduce((s,r)=>s+r.score,0)/sorted.length)}/100\n\n`;
  out += '='.repeat(70) + '\nCANDIDATE RANKINGS\n' + '-'.repeat(70) + '\n';
  sorted.forEach((r,i) => {
    out += `\n#${i+1} ${r.name}\nScore: ${r.score}/100 | ${r.recommendation}\nStrengths: ${(r.strengths||[]).join(' | ')}\nGaps: ${(r.gaps||[]).join(' | ')}\nSummary: ${r.summary}\n` + '-'.repeat(70) + '\n';
  });
  if (state.insights && state.insights.length) {
    out += '\n' + '='.repeat(70) + '\nAI HIRING INSIGHTS\n' + '-'.repeat(70) + '\n';
    state.insights.forEach((item,i) => { out += `\n${i+1}. ${item.category}\n   ${item.insight}\n`; });
  }
  out += '\nGenerated by AI Resume Screener — Powered by Groq API\n';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([out], { type: 'text/plain' }));
  a.download = 'screening-report-' + new Date().toISOString().split('T')[0] + '.txt';
  a.click();
}

function markManual(id) {
  const c = state.candidates.find(x => x.id === id);
  if (c) { c._fromFile = false; c._fileName = ''; }
}

function handleDrop(event, id) {
  event.preventDefault();
  const zone = document.getElementById('upload-zone-' + id);
  if (zone) zone.classList.remove('dragover');
  const file = event.dataTransfer.files[0];
  if (file) processFile(file, id);
}

function handleFileUpload(event, id) {
  const file = event.target.files[0];
  if (file) processFile(file, id);
}

async function processFile(file, id) {
  const zone  = document.getElementById('upload-zone-' + id);
  const label = document.getElementById('upload-label-' + id);
  if (label) { label.className = 'upload-label'; label.innerHTML = '<div class="spinner"></div> Reading file...'; }

  try {
    let text = '';
    if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) {
      text = await extractPDF(file);
    } else {
      text = await file.text();
    }

    const c = state.candidates.find(x => x.id === id);
    if (c) {
      c.resume = text;
      c._fromFile = true;
      c._fileName = file.name;
      // auto-fill name from filename if empty
      if (!c.name.trim()) {
        const nameGuess = file.name.replace(/\.[^/.]+$/, '').replace(/[-_]/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        c.name = nameGuess;
      }
    }

    // update UI without full re-render
    if (zone)  { zone.classList.add('loaded'); }
    if (label) { label.className = 'upload-label success'; label.innerHTML = '&#x2713; ' + esc(file.name); }

    // update textarea
    const ta = document.querySelector('#cand-' + id + ' textarea');
    const ni = document.querySelector('#cand-' + id + ' input[type="text"]');
    if (ta) ta.value = text;
    if (ni && c && c.name) ni.value = c.name;

    // update analyze button
    const filled = state.candidates.filter(c => c.name.trim() && c.resume.trim()).length;
    const btn = document.querySelector('.nav-row .btn-primary');
    if (btn) { btn.disabled = filled < 1; btn.textContent = 'Analyze ' + filled + ' Candidate' + (filled !== 1 ? 's' : '') + ' \u2192'; }

  } catch (err) {
    if (label) { label.className = 'upload-label'; label.innerHTML = '&#x26A0; Failed to read file — try pasting manually'; }
    console.error('File read error:', err);
  }
}

async function extractPDF(file) {
  const pdfjsLib = window['pdfjs-dist/build/pdf'];
  if (!pdfjsLib) throw new Error('PDF.js not loaded');
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  let fullText = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const pageText = content.items.map(item => item.str).join(' ');
    fullText += pageText + '\n';
  }
  return fullText.trim();
}

window.addEventListener('DOMContentLoaded', render);
